stages:
  - build

default:
  image: docker:dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY

workflow:
  rules:
    - when: always

build-dind-image:
  stage: build
  script:
    - cd dind-image
    - docker build -t ${IMAGE_PATH}/runner-image:dind .
    - docker push ${IMAGE_PATH}/runner-image:dind
  # rules:
  #   - changes:
  #       - dind-image/*

build-bash-image:
  stage: build
  script:
