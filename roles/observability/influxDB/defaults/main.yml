---
# defaults file for influxDB

project_dir: "/opt/services/observability"
service_dir: "{{ project_dir }}/influxDB"
docker_networks:
  - prinet
  - pubnet

# .env vars
restart_policy: unless-stopped
influxdb_image_tag: latest
influxdb_container_name: influxdb
influxdb_port: 8086
docker_influxdb_init_mode: setup
docker_influxdb_init_username: admin
docker_influxdb_init_password: adminpassword
docker_influxdb_init_org: orgorg
docker_influxdb_init_bucket: default
docker_influxdb_init_admin_token: an-strong-auth-admin-token!!!!!
influxdb_memory_limit: 2G
influxdb_memory_reservation: 1G
influxdb_max_log_size: 50m
influxdb_max_log_file: 3

# config file vars

