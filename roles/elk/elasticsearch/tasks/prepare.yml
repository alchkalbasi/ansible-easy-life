# preparation tasks

- name: Create elk project directory 
  ansible.builtin.file:
    path: "{{ project_dir }}"
    state: directory
  tags:
    - project-dir

- name: Create elasticsearch service directory 
  ansible.builtin.file:
    path: "{{ service_dir }}"
    state: directory
  tags:
    - eservice-dir

- name: Create elasticsearch data directory 
  ansible.builtin.file:
    path: "{{ service_dir }}/edata"
    state: directory
    owner: '1000'
    group: '1000'
    mode: '0755'
  tags:
    - edata-dir