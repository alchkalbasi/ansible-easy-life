# logstash preparation tasks

- name: Create elk project directory 
  ansible.builtin.file:
    path: "{{ project_dir }}"
    state: directory
  tags:
    - project-dir

- name: Create logstash service directory 
  ansible.builtin.file:
    path: "{{ service_dir }}"
    state: directory
  tags:
    - lservice-dir

- name: Create logstash pipeline directory 
  ansible.builtin.file:
    path: "{{ service_dir }}/pipeline"
    state: directory
    owner: '1000'
    group: '1000'
    mode: '0755'
  tags:
    - pipeline-dir

- name: Create logstash data directory 
  ansible.builtin.file:
    path: "{{ service_dir }}/ldata"
    state: directory
    owner: '1000'
    group: '1000'
    mode: '0755'
  tags:
    - ldata-dir