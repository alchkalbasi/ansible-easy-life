---
# xray setup tasks

- name: Install Xray from Official Script
  ansible.builtin.shell: |
    bash -c "$(curl -L https://github.com/XTLS/Xray-install/raw/main/install-release.sh)"
  args:
    creates: /usr/local/bin/xray
  become: true
  tags:
    - docker
    - docker-install-xray
    - docker-xray-script

- name: Copy Xray Config File
  ansible.builtin.copy:
    src: config.json
    dest: /usr/local/etc/xray/config.json
    mode: "0644"
  notify: Restart Xray
  tags:
    - docker
    - docker-install-xray
    - docker-xray-config

- name: Enable and start Xray
  ansible.builtin.systemd_service:
    name: xray
    enabled: true
    state: started
  tags:
    - docker
    - docker-install-xray
    - docker-xray-enable
