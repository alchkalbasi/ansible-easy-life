---
# docker requirement tasks

- name: Uninstall Old Versions Of Docker
  ansible.builtin.apt:
    name: "{{ docker_old_packages | default(['docker', 'docker-engine', 'docker.io', 'containerd', 'runc']) }}"
    state: absent
  become: true
  tags:
    - docker
    - docker-pre-install
    - docker-purge

- name: Install prerequisite packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true
  become: true
  tags:
    - docker
    - docker-pre-install
    - docker-prereqs

- name: Create directory for APT keyrings
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  become: true
  tags:
    - docker
    - docker-pre-install
    - docker-apt-repo

- name: Gather only OS-related facts
  ansible.builtin.setup:
    gather_subset:
      - "!all"
      - "os_family"
      - "distribution"
      - "system"
  tags:
    - docker
    - docker-pre-install
    - docker-distro-apt

- name: Download Docker GPG key
  ansible.builtin.get_url:
    url: >-
      {{
        docker_custom_gpg_url
        | default(
            'https://download.docker.com/linux/'
            ~ ansible_facts['distribution'] | lower
            ~ '/gpg'
          )
      }}
    dest: "/etc/apt/keyrings/{{ docker_gpg_file_name }}.asc"
    mode: '0644'
    force: true
  become: true
  tags:
    - docker
    - docker-pre-install
    - docker-apt-repo
    - docker-gpg-file

- name: Add Docker repository to APT sources
  ansible.builtin.apt_repository:
    repo: >
      deb [arch={{ 'amd64' if ansible_facts['architecture'] == 'x86_64' else ansible_facts['architecture'] }}
      signed-by=/etc/apt/keyrings/{{ docker_gpg_file_name }}.asc]
      {{ docker_custom_apt_url | default('https://download.docker.com/linux/' ~ (ansible_facts['distribution'] | lower)) }}
      {{ ansible_facts['distribution_release'] }} stable
    state: present
    filename: docker
    update_cache: true
  become: true
  tags:
    - docker
    - docker-pre-install
    - docker-apt-repo
