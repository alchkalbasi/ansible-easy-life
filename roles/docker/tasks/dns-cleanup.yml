---
# DNS cleanup tasks

- name: Check if resolv.conf backup exists
  become: true
  ansible.builtin.stat:
    path: /etc/resolv.conf.back
  register: docker_resolv_conf_backup
  tags:
    - docker
    - docker-clean-dns

- name: Remove current resolv.conf
  become: true
  ansible.builtin.file:
    path: /etc/resolv.conf
    state: absent
  when: docker_resolv_conf_backup.stat.exists
  tags:
    - docker
    - docker-clean-dns

- name: Restore original resolv.conf from backup
  become: true
  ansible.builtin.copy:
    src: /etc/resolv.conf.back
    dest: /etc/resolv.conf
    remote_src: true
    owner: root
    group: root
    mode: "0644"
  when: docker_resolv_conf_backup.stat.exists
  tags:
    - docker
    - docker-clean-dns

- name: Remove resolv.conf backup
  become: true
  ansible.builtin.file:
    path: /etc/resolv.conf.back
    state: absent
  when: docker_resolv_conf_backup.stat.exists
  tags:
    - docker
    - docker-clean-dns
