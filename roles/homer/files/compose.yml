services:
  db:
    image: postgres:${POSTGRES_IMAGE_TAG}
    container_name: ${POSTGRES_CONTAINER_NAME}
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: ${RESTART_POLICY}
    networks: 
      - prinet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  heplify-server:
    image: sipcapture/heplify-server:${HEPLIFY_IMAGE_TAG}
    container_name: ${HEPLIFY_CONTAINER_NAME}
    command:
      - './heplify-server'
    ports:
      - "${PROM_SERVER_IP}:9060:9060/udp"
      - "${PROM_SERVER_IP}:9060:9060/tcp"
      - "${PROM_SERVER_IP}:9096:9096"
    environment:
      - "HEPLIFYSERVER_DBDRIVER=postgres"
      - "HEPLIFYSERVER_DBADDR=db:5432"
      - "HEPLIFYSERVER_DBUSER=${POSTGRES_USER}"
      - "HEPLIFYSERVER_DBPASS=${POSTGRES_PASSWORD}"
      - "HEPLIFYSERVER_DBDATA=${POSTGRES_DB}"
      - "HEPLIFYSERVER_HEPADDR=0.0.0.0:9060"
      - "HEPLIFYSERVER_PROMADDR=0.0.0.0:9096"
      - "HEPLIFYSERVER_DBSHEMATEST=true"
      - "HEPLIFYSERVER_LOGSTD=true"
    depends_on:
      db:
        condition: service_healthy
    restart: ${RESTART_POLICY}
    networks: 
      - prinet

  homer-app:
    image: sipcapture/homer-app:${HEPLIFYUI_IMAGE_TAG}
    container_name: ${HEPLIFYUI_CONTAINER_NAME}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${PROM_SERVER_IP}:9080:80"
    environment:
      - "DB_TYPE=postgres"
      - "DB_HOST=db"
      - "DB_PORT=5432"
      - "DB_USER=${POSTGRES_USER}"
      - "DB_PASS=${POSTGRES_PASSWORD}"
      - "DB_NAME=${POSTGRES_DB}"
      - "HOMER_LOG_STDOUT=true"
    restart: ${RESTART_POLICY}
    networks: 
      - prinet

volumes:
  postgres_data:

networks:
  prinet:
    external: true