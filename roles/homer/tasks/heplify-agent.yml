---
# heplify agent

- name: Download heplify-agent with check (sha256)
  ansible.builtin.get_url:
    url: "{{ heplify_agent_url }}"
    dest: "{{ heplify_agent_download_path }}"
    checksum: "{{ heplify_agent_sha }}"

- name: Give execute permission and move it.
  ansible.builtin.file:
    src: "{{ heplify_agent_download_path }}/heplify"
    dest: "{{ heplify_agent_execute_path }}"
    owner: root
    group: root
    mode: '755'

- name: Template the heplify.service file to path
  ansible.builtin.template:
    src: heplify.service.j2
    dest: "{{ systemd_path }}/heplify.service"

- name: Reload systemd, enable and start heplify
  ansible.builtin.systemd_service:
    name: heplify
    state: started
    enabled: true
    daemon_reload: true