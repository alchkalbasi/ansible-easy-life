- name: Create RustFS service directory 
  ansible.builtin.file:
    path: "{{ service_dir }}"
    state: directory
  tags:
    - service-dir

- name: Create data directory
  ansible.builtin.file:
    path: "{{ service_dir }}/data"
    state: directory
    mode: '0755'
    owner: '10001'
    group: 10001
  tags:
    - data-dir

- name: Create logs directory
  ansible.builtin.file:
    path: "{{ service_dir }}/logs"
    state: directory
    mode: '0750'
    owner: '10001'
    group: 10001
  tags:
    - logs-dir

- name: Create otel-confs directory
  ansible.builtin.file:
    path: "{{ service_dir }}/otel-confs"
    state: directory
    mode: '0755'
  tags:
    - otel-dir

- name: Create Nginx config directory
  ansible.builtin.file:
    path: "{{ service_dir }}/nginx/conf.d"
    state: directory
    mode: '0755'
  tags: nginx-conf-dir

- name: Check if nginx certs directory has any files
  ansible.builtin.find:
    paths: "{{ service_dir }}/nginx/certs"
    file_type: any
  register: nginx_certs_content
  tags:
    - nginx-certs-dir

- name: Create Nginx certs directory
  ansible.builtin.file:
    path: "{{ service_dir }}/nginx/certs"
    state: directory
    mode: '0755'
  when: nginx_certs_content.matched == 0
  tags:
    - nginx-certs-dir

- name: Copy the compose file with owner and permissions
  ansible.builtin.copy:
    src: compose.yml
    dest: "{{ service_dir }}/compose.yml"
    mode: '0755'
  tags:
    - compose-file
